# OML properties
oml-code:
   schemaVersion: 1

# Project properties
project:
   title: Dave Demo 3
   description: Interface management model kinda like CAESAR
   group: io.github.dw-oml-3
   version: 0.1.0

# source folders
sources:
  oml:
    - src/method/oml
    - src/model/oml
  md:
    - src/method/md
    - src/model/md

# npm registries
registries:
  - url: https://www.npmjs.com/

# npm dependencies
dependencies:
  "@oml/core": "^1.0.0"

# oml server settings
server:
  port: 8081

# oml-cli parameter defaults
defaults:
  build:
    owl: build/owl
  render:
    md: src/model/md
    web: build/web
    context: src/model/oml/dw-oml-3.github.io/bundle.oml

